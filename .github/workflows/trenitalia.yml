name: Generate Trenitalia GTFS

on:
  workflow_call:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  update-trenitalia:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install required tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zip gh curl wget

      - name: Download TrenItalia Netex file
        run: |
          wget -O trenitalia.xml.gz "https://www.cciss.it/nap/mmtis/public/api/v1/download/blob/Asset/1080596/resource"
          gunzip trenitalia.xml.gz

      - name: Build netex-to-gtfs
        run: |
          git clone https://github.com/entur/netex-to-gtfs.git
          cd netex-to-gtfs
          mvn clean install

      - name: Convert to GTFS
        run: |
          java -jar netex-to-gtfs/target/netex-to-gtfs.jar \
            --input-file trenitalia.xml \
            --output-file trenitalia_gtfs.zip \
            --profile EPIP

      - name: Upload to latest release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload latest trenitalia_gtfs.zip --repo catenarytransit/pfaedled-gtfs-actions --clobber
