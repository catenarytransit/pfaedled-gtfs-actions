name: Update Pfaedle file SNCF

on:
  workflow_call:

jobs:
  upload-release-asset:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download unzip and zip
        run: sudo apt install unzip zip -y

      - name: Install OSM tools
        run: sudo apt install osmium-tool osmctools -y

      - name: Build Pfaedle
        run: |
          git clone https://github.com/catenarytransit/pfaedle-rs
          cd pfaedle-rs
          cargo build --release

      - name: Download osm files
        run: |
          wget https://github.com/catenarytransit/osm-filter/releases/download/latest/railonly-europe-latest.osm.pbf
          wget https://github.com/catenarytransit/osm-filter/releases/download/latest/pfaedle-filtered-france-latest.osm.pbf

      - name: Download SNCF files
        run: |
          wget https://eu.ftp.opendatasoft.com/sncf/plandata/Export_OpenData_SNCF_GTFS_NewTripId.zip

      - name: Extract SNCF
        run: |
          unzip Export_OpenData_SNCF_GTFS_NewTripId.zip -d sncf

      - name: Run pfaedle SNCF
        run: |
          ./pfaedle-rs/target/release/pfaedle-rs -o railonly-europe-latest.osm.pbf -g sncf --mots rail
          ./pfaedle-rs/target/release/pfaedle-rs -o pfaedle-filtered-france-latest.osm.pbf -g sncf --mots bus

      - name: Zip pfaedle SNCF
        run: zip -9 -r sncf_pfaedle.zip sncf/*

      - name: Upload SNCF results
        env:
          GITHUB_TOKEN: ${{ secrets.GITUHB_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          ASSET_PATH: sncf_pfaedle.zip # Replace with the actual path to your file
          RELEASE_TAG: latest
        run: |
          echo "Uploading asset: $ASSET_PATH to release latest"
          gh release upload latest "$ASSET_PATH" --clobber
        shell: bash
        if: env.ASSET_PATH != ''
