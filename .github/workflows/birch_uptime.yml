name: birch_uptime

on:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read

concurrency:
  group: birch-uptime-check
  cancel-in-progress: false

jobs:
  check-uptime:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Uptime Checker
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          cd uptime-checker
          cargo run --release

